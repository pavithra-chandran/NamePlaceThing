<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="public/favicon.png">
  <title>Game Page - Epic Gaming Experience</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/game-page.css">
</head>
<body>
  <!-- Animated particles wrapper -->
  <div id="wrapper"></div>
  
  <!-- Header with host indicator and rounds -->
  <div class="header-container">
    <div id="hostIndicator" class="host-indicator" style="display: none;">
      <i class="fas fa-crown me-2"></i>HOST
    </div>
    <div class="rounds-top-right" id="remainingRounds">
      <i class="fas fa-sync-alt me-2"></i>Rounds: 0
    </div>
    <div class="timer" id="timer" style="position: absolute; right: 20px; top: 10px;">
      <i class="fas fa-clock me-2"></i>0:00
    </div>
  </div>

  <div class="container position-relative">
    <div class="game-container">
      <!-- Player Card -->
      <div class="player-card">
        <div class="player-card-content">
          <img src="https://ui-avatars.com/api/?name=Player&background=random&size=150" 
               alt="Player Avatar" class="player-avatar" id="playerAvatar">
          <div class="player-name" id="playerNameDisplay">Loading...</div>
          <!-- <div class="player-status" id="playerStatus">Waiting</div> -->
        </div>
      </div>

      <!-- Message Box -->
      <div id="messageBox" class="message-box" style="display: none;"></div>
      <div class="letter-history" id="letterHistory"></div>

      <!-- Game Section -->
      <div class="text-center">
        <!-- Alphabet Display -->
        <div class="alphabet-container" id="alphabetContainer">
          <span>?</span>
        </div>
        
        <!-- Bonus Instruction -->
        <div class="bonus-instruction">
          <i class="fas fa-bolt"></i> Complete first to get 10 bonus points!
        </div>
        
        <!-- Start Button (Host Only) -->
        <div id="startButtonContainer" class="start-btn" style="display: none;">
          <i class="fas fa-play me-2"></i>Start Game
        </div>
        
        <!-- Waiting Message -->
        <div id="waitingMessage" class="waiting-message">
          <i class="fas fa-hourglass-half"></i>Waiting for Host to Start the Game...
        </div>
        
        <!-- Input Fields Row 1 -->
        <div class="input-row">
          <div class="user-input" data-icon="user">
            <input type="text" id="name" name="name" placeholder="Name starts with..." disabled autocomplete="off">
          </div>
          <div class="user-input" data-icon="map-marker-alt">
            <input type="text" id="place" name="place" placeholder="Place starts with..." disabled autocomplete="off">
          </div>
          <div class="user-input" data-icon="box-open">
            <input type="text" id="thing" name="thing" placeholder="Thing starts with..." disabled autocomplete="off">
          </div>
        </div>
        
        <!-- Input Fields Row 2 -->
        <div class="input-row">
          <div class="user-input" data-icon="paw">
            <input type="text" id="animal" name="animal" placeholder="Animal starts with..." disabled autocomplete="off">
          </div>
          <div class="user-input" data-icon="film">
            <input type="text" id="movie" name="movie" placeholder="Movie starts with..." disabled autocomplete="off">
          </div>
          <div class="submit-container">
            <button type="button" id="submitBtn" class="submit-btn" style="display: none;">
              <i class="fas fa-paper-plane me-2"></i>Submit Answers
            </button>
          </div>
        </div>
      </div>

      <!-- Scores Container -->
      <div class="scores-container">
        <h4 class="text-center mb-3">
          <i class="fas fa-trophy me-2"></i>Current Scores
        </h4>
        <div id="scoresDisplay">
          <!-- Score items will be dynamically inserted here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Waiting Modal -->
  <div id="waitingModal" class="modal-overlay waiting-overlay" style="display: none;">
    <div><i class="fas fa-users me-2"></i>Waiting for other players to score...</div>
    <div class="spinner"></div>
  </div>

  <!-- Countdown Modal -->
  <div id="countdownModal" class="modal-overlay" style="display: none;">
    <div class="countdown-modal">
      <i class="fas fa-trophy"></i>
      <h2>Game Starting...</h2>
      <div id="countdownNumber" class="countdown-number">5</div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script src="scripts/firebase-config.js"></script>
  <script src="scripts/particles.js"></script>
  <script src="scripts/game-page.js"></script>
</body>
</html>
