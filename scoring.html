<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="public/favicon.png">
  <title>Scoring</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style/scoring.css">
</head>
<body>
  <!-- Hexagon pattern background -->
  <div class="hex-pattern"></div>

  <!-- Circuit board effect -->
  <div class="circuit-bg" id="circuitBg"></div>

  <!-- Animated gaming background -->
  <div class="game-bg-effects">
    <i class="floating-icon fas fa-gamepad"></i>
    <i class="floating-icon fas fa-trophy"></i>
    <i class="floating-icon fas fa-star"></i>
    <i class="floating-icon fas fa-crown"></i>
    <i class="floating-icon fas fa-dice"></i>
    <i class="floating-icon fas fa-medal"></i>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <div class="modal-overlay" style="display: flex;">
    <div class="text-center w-100">
      <h2>
        <i class="fas fa-star"></i>
        Score Other Players' Answers
        <i class="fas fa-star"></i>
      </h2>
      <div id="scoringContent" class="scoring-content"></div>
    </div>
  </div>

  <!-- Countdown Modal -->
  <div id="countdownModal" class="modal-overlay" style="display: none;">
    <div class="countdown-modal">
      <i class="fas fa-trophy"></i>
      <h2>Next Round Starting...</h2>
      <div id="countdownNumber" class="countdown-number">5</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script src="scripts/firebase-config.js"></script>
  <script src="scripts/scoring.js"></script>

  <script>
    // Generate particles for background effect
    function createParticles() {
      const container = document.querySelector('.game-bg-effects');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 8 + 3 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 12 + 10) + 's';
        container.appendChild(particle);
      }
    }

    // Create circuit board lines
    function createCircuitLines() {
      const circuitBg = document.getElementById('circuitBg');
      for (let i = 0; i < 10; i++) {
        const line = document.createElement('div');
        line.className = 'circuit-line';
        line.style.top = Math.random() * 100 + '%';
        line.style.width = Math.random() * 200 + 100 + 'px';
        line.style.animationDelay = Math.random() * 8 + 's';
        line.style.animationDuration = (Math.random() * 4 + 6) + 's';
        circuitBg.appendChild(line);
      }
    }

    // Confetti/Popcracker animation
    function createConfetti() {
      const container = document.getElementById('confettiContainer');
      const colors = ['#ffeb3b', '#ff6b6b', '#8a2be2', '#00f5ff', '#ff1493', '#00ff00'];
      
      // Create confetti pieces
      for (let i = 0; i < 150; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        
        // Random size
        const size = Math.random() * 10 + 5;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';
        
        // Random rotation
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        
        container.appendChild(confetti);
        
        // Remove after animation
        setTimeout(() => {
          confetti.remove();
        }, 3500);
      }
      
      // Clear container after all animations complete
      setTimeout(() => {
        container.innerHTML = '';
      }, 4000);
    }

    // Explosion confetti from center
    function createExplosionConfetti() {
      const container = document.getElementById('confettiContainer');
      const colors = ['#ffeb3b', '#ff6b6b', '#8a2be2', '#00f5ff', '#ff1493', '#00ff00'];
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti explode';
        
        const angle = (Math.PI * 2 * i) / 100;
        const velocity = Math.random() * 300 + 200;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        
        confetti.style.left = centerX + 'px';
        confetti.style.top = centerY + 'px';
        confetti.style.setProperty('--tx', tx + 'px');
        confetti.style.setProperty('--ty', ty + 'px');
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.1 + 's';
        
        const size = Math.random() * 12 + 6;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';
        
        container.appendChild(confetti);
        
        setTimeout(() => {
          confetti.remove();
        }, 2000);
      }
    }

    createParticles();
    createCircuitLines();

    // Add trophy icon to submit button when it's created
    const observer = new MutationObserver(() => {
      const submitBtn = document.getElementById('submitScoringBtn');
      if (submitBtn && !submitBtn.querySelector('.trophy-icon')) {
        const icon = document.createElement('i');
        icon.className = 'fas fa-trophy trophy-icon';
        submitBtn.appendChild(icon);
        
        // Add click event for confetti
        submitBtn.addEventListener('click', function(e) {
          // Create both types of confetti
          createExplosionConfetti();
          setTimeout(() => {
            createConfetti();
          }, 200);
        });
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
